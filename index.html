<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heraion Demo - AI Reasoning for Analog Circuit Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            padding: 40px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1600px;
            height: 100%;
            max-height: 900px;
        }

        .virtuoso-window {
            background: #1e2633;
            border-radius: 12px;
            border: 1px solid #2d3748;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            height: 100%;
        }

        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 400px;
            overflow: hidden;
        }

        .schematic-area {
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2d3748;
        }

        .chat-panel {
            background: #151d28;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #3b82f6;
            position: relative;
        }

        .chat-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, #3b82f6 0%, transparent 100%);
        }

        .toolbar {
            background: #15202b;
            padding: 12px 20px;
            border-bottom: 1px solid #2d3748;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .toolbar-title {
            margin-left: 16px;
            color: #8b95a5;
            font-size: 13px;
            font-family: Menlo, Monaco, monospace;
        }

        .content {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .schematic-canvas {
            flex: 1;
            background: #0d1117;
            border-radius: 8px;
            border: 1px solid #2d3748;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .circuit-element {
            transition: all 0.3s ease;
        }

        .circuit-highlight {
            filter: drop-shadow(0 0 8px #3b82f6);
        }

        .properties-panel {
            background: #15202b;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #2d3748;
            font-family: Menlo, Monaco, monospace;
            font-size: 13px;
        }

        .property-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            color: #94a3b8;
        }

        .property-value {
            color: #e2e8f0;
            font-weight: 600;
        }

        .property-value.updating {
            color: #3b82f6;
            animation: pulse 1s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .section-title {
            color: #e2e8f0;
            font-size: 14px;
            font-family: Menlo, Monaco, monospace;
            margin-bottom: 8px;
        }

        .waveform-container {
            flex: 1;
            background: #0d1117;
            border-radius: 8px;
            border: 1px solid #2d3748;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-bar {
            padding: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.5s ease;
        }

        .status-bar.idle { background: #1e3a5f; }
        .status-bar.failed { background: #7f1d1d; }
        .status-bar.success { background: #064e3b; }

        .heraion-header {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .heraion-logo {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            color: #3b82f6;
        }

        .heraion-title {
            color: white;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .heraion-subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }

        .analyzing {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            background: #1e3a5f;
            border-radius: 8px;
        }

        .chat-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chat-icon {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
            color: #3b82f6;
        }

        .chat-title {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: #2d3748;
            color: #e2e8f0;
            margin-left: 40px;
        }

        .message.assistant {
            background: #1e3a5f;
            color: #93c5fd;
            margin-right: 40px;
            border-left: 3px solid #3b82f6;
        }

        .message.assistant .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #60a5fa;
        }

        .code-block {
            background: #0d1117;
            border: 1px solid #2d3748;
            border-radius: 6px;
            padding: 12px;
            margin-top: 8px;
            font-family: Menlo, Monaco, monospace;
            font-size: 12px;
            color: #e2e8f0;
        }

        .suggestion-button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .suggestion-button:hover {
            background: #2563eb;
        }

        .suggestion-button.success {
            background: #10b981;
        }

        .chat-input {
            padding: 16px 20px;
            border-top: 1px solid #2d3748;
            background: #1e2633;
        }

        .input-field {
            width: 100%;
            background: #0d1117;
            border: 1px solid #2d3748;
            border-radius: 6px;
            padding: 10px 12px;
            color: #e2e8f0;
            font-size: 13px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        }

        .input-field::placeholder {
            color: #64748b;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #3b82f6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .ai-response {
            background: #0f1922;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #2d3748;
        }

        .ai-text {
            color: #e2e8f0;
            font-size: 14px;
            font-family: Menlo, Monaco, monospace;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .apply-button {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .apply-button.success {
            background: #10b981;
        }

        .performance-summary {
            margin-top: 20px;
            padding: 20px;
            background: #064e3b;
            border-radius: 8px;
            border: 1px solid #10b981;
        }

        .summary-title {
            color: #6ee7b7;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            color: #d1fae5;
            font-size: 14px;
            font-family: Menlo, Monaco, monospace;
        }

        .metric-label {
            opacity: 0.7;
            font-size: 12px;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 700;
        }

        .tagline {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #64748b;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .tagline.show {
            opacity: 1;
        }

        .hidden {
            display: none;
        }

        .waveform {
            transition: stroke 0.5s ease;
        }

        .pm-indicator {
            transition: stroke 0.5s ease;
        }

        .pm-text {
            transition: fill 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="virtuoso-window">
            <!-- Toolbar -->
            <div class="toolbar">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
                <span class="toolbar-title">opamp_diffpair.sch — Cadence Virtuoso Schematic Editor</span>
            </div>

            <div class="main-content">
                <!-- Left: Schematic Area -->
                <div class="schematic-area">
                    <div class="content">
                        <div class="section-title">Schematic — Two-Stage Op-Amp</div>

                        <div class="schematic-canvas">
                            <!-- Grid background -->
                            <svg width="100%" height="100%" style="position: absolute;">
                                <defs>
                                    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
                                        <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e2d3d" stroke-width="0.5"/>
                                    </pattern>
                                </defs>
                                <rect width="100%" height="100%" fill="url(#grid)" />
                            </svg>

                            <!-- Circuit Schematic -->
                            <svg width="90%" height="90%" viewBox="0 0 800 600" style="position: relative;">
                                <!-- Power rails -->
                                <line x1="50" y1="50" x2="750" y2="50" stroke="#94a3b8" stroke-width="2"/>
                                <text x="400" y="40" fill="#94a3b8" font-size="14" text-anchor="middle" font-family="Menlo, Monaco, monospace">VDD</text>
                                
                                <line x1="50" y1="550" x2="750" y2="550" stroke="#94a3b8" stroke-width="2"/>
                                <text x="400" y="575" fill="#94a3b8" font-size="14" text-anchor="middle" font-family="Menlo, Monaco, monospace">VSS</text>

                                <!-- Input Stage - Differential Pair -->
                                <g id="input-stage" class="circuit-element">
                                    <!-- M1 - Left input transistor -->
                                    <rect x="150" y="200" width="60" height="80" fill="none" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="150" y1="240" x2="130" y2="240" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="210" y1="220" x2="240" y2="220" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="210" y1="260" x2="240" y2="260" stroke="#60a5fa" stroke-width="2"/>
                                    <text x="180" y="245" fill="#e2e8f0" font-size="12" text-anchor="middle" font-family="Menlo, Monaco, monospace">M1</text>
                                    
                                    <!-- M2 - Right input transistor -->
                                    <rect x="290" y="200" width="60" height="80" fill="none" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="290" y1="240" x2="270" y2="240" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="350" y1="220" x2="380" y2="220" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="350" y1="260" x2="380" y2="260" stroke="#60a5fa" stroke-width="2"/>
                                    <text x="320" y="245" fill="#e2e8f0" font-size="12" text-anchor="middle" font-family="Menlo, Monaco, monospace">M2</text>

                                    <!-- Current source -->
                                    <circle cx="250" cy="350" r="20" fill="none" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="250" y1="280" x2="250" y2="330" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="240" y1="260" x2="250" y2="280" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="260" y1="260" x2="250" y2="280" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="250" y1="370" x2="250" y2="420" stroke="#60a5fa" stroke-width="2"/>
                                    <text x="280" y="355" fill="#e2e8f0" font-size="11" font-family="Menlo, Monaco, monospace">Ibias</text>
                                </g>

                                <!-- Active Loads -->
                                <g id="load-stage" class="circuit-element">
                                    <!-- M3 - Load transistor left -->
                                    <rect x="210" y="100" width="60" height="60" fill="none" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="240" y1="100" x2="240" y2="80" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="240" y1="160" x2="240" y2="220" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="270" y1="130" x2="290" y2="130" stroke="#60a5fa" stroke-width="2"/>
                                    <text x="240" y="135" fill="#e2e8f0" font-size="12" text-anchor="middle" font-family="Menlo, Monaco, monospace">M3</text>
                                    
                                    <!-- M4 - Load transistor right -->
                                    <rect x="350" y="100" width="60" height="60" fill="none" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="380" y1="100" x2="380" y2="80" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="380" y1="160" x2="380" y2="220" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="350" y1="130" x2="290" y2="130" stroke="#60a5fa" stroke-width="2"/>
                                    <text x="380" y="135" fill="#e2e8f0" font-size="12" text-anchor="middle" font-family="Menlo, Monaco, monospace">M4</text>

                                    <!-- Mirror connection -->
                                    <circle cx="290" cy="130" r="3" fill="#60a5fa"/>
                                </g>

                                <!-- Second Stage - Common Source Amp -->
                                <g id="output-stage" class="circuit-element">
                                    <!-- M5 - Output transistor -->
                                    <rect x="520" y="180" width="80" height="100" fill="none" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="480" y1="230" x2="520" y2="230" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="600" y1="200" x2="640" y2="200" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="600" y1="260" x2="640" y2="260" stroke="#60a5fa" stroke-width="2"/>
                                    <text x="560" y="235" fill="#e2e8f0" font-size="12" text-anchor="middle" font-family="Menlo, Monaco, monospace">M5</text>

                                    <!-- Load resistor -->
                                    <rect x="630" y="100" width="20" height="80" fill="none" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="640" y1="80" x2="640" y2="100" stroke="#60a5fa" stroke-width="2"/>
                                    <line x1="640" y1="180" x2="640" y2="200" stroke="#60a5fa" stroke-width="2"/>
                                    <text x="670" y="145" fill="#e2e8f0" font-size="11" font-family="Menlo, Monaco, monospace">RL</text>
                                </g>

                                <!-- Compensation Capacitor (highlighted) -->
                                <g id="miller-cap" class="circuit-element">
                                    <line x1="380" y1="220" x2="480" y2="230" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="5,5"/>
                                    <rect x="420" y="210" width="30" height="40" fill="none" stroke="#3b82f6" stroke-width="3"/>
                                    <line x1="420" y1="230" x2="410" y2="230" stroke="#3b82f6" stroke-width="2.5"/>
                                    <line x1="450" y1="230" x2="460" y2="230" stroke="#3b82f6" stroke-width="2.5"/>
                                    <text x="435" y="270" fill="#3b82f6" font-size="13" text-anchor="middle" font-family="Menlo, Monaco, monospace" font-weight="bold" id="cap-label">C_comp</text>
                                    <text x="435" y="288" fill="#3b82f6" font-size="12" text-anchor="middle" font-family="Menlo, Monaco, monospace" id="cap-value">1.5pF</text>
                                </g>

                                <!-- Connection lines -->
                                <line x1="380" y1="220" x2="380" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
                                <line x1="380" y1="190" x2="480" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
                                <line x1="480" y1="190" x2="480" y2="230" stroke="#94a3b8" stroke-width="1.5"/>
                                <line x1="640" y1="260" x2="640" y2="350" stroke="#94a3b8" stroke-width="2"/>
                                <line x1="250" y1="420" x2="250" y2="550" stroke="#94a3b8" stroke-width="2"/>

                                <!-- Input terminals -->
                                <circle cx="130" cy="240" r="4" fill="#10b981"/>
                                <text x="90" y="245" fill="#10b981" font-size="12" font-family="Menlo, Monaco, monospace">Vin+</text>
                                <circle cx="270" cy="240" r="4" fill="#10b981"/>
                                <text x="270" y="230" fill="#10b981" font-size="12" font-family="Menlo, Monaco, monospace">Vin-</text>

                                <!-- Output terminal -->
                                <circle cx="640" cy="350" r="5" fill="#ef4444"/>
                                <text x="655" y="355" fill="#ef4444" font-size="13" font-family="Menlo, Monaco, monospace" font-weight="bold">Vout</text>
                            </svg>
                        </div>

                        <!-- Properties Panel -->
                        <div class="properties-panel">
                            <div style="color: #e2e8f0; font-weight: 600; margin-bottom: 8px; font-size: 12px;">Selected: C_comp (Miller Compensation)</div>
                            <div class="property-row">
                                <span>Capacitance:</span>
                                <span class="property-value" id="prop-cap">1.5 pF</span>
                            </div>
                            <div class="property-row">
                                <span>Voltage Rating:</span>
                                <span class="property-value">3.3 V</span>
                            </div>
                            <div class="property-row">
                                <span>Type:</span>
                                <span class="property-value">MIM</span>
                            </div>
                        </div>

                        <!-- Status bar -->
                        <div id="status-bar" class="status-bar idle">
                            <div style="width: 20px; height: 20px; border: 2px solid #64748b; border-radius: 50%; opacity: 0.5;"></div>
                            <span style="color: #64748b; font-size: 14px;">Ready to simulate</span>
                        </div>
                    </div>
                </div>

                <!-- Right: Heraion Chat Panel -->
                <div class="chat-panel">
                    <div class="chat-header">
                        <div class="chat-icon">H</div>
                        <span class="chat-title">Heraion AI Assistant</span>
                    </div>

                    <div id="chat-messages" class="chat-messages">
                        <!-- Messages will be added dynamically -->
                    </div>

                    <div class="chat-input">
                        <input type="text" class="input-field" placeholder="Ask Heraion about your circuit..." disabled>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="tagline" class="tagline">From hours to minutes. From guessing to reasoning.</div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const statusBar = document.getElementById('status-bar');
        const millerCap = document.getElementById('miller-cap');
        const capLabel = document.getElementById('cap-label');
        const capValue = document.getElementById('cap-value');
        const propCap = document.getElementById('prop-cap');
        const tagline = document.getElementById('tagline');

        function addMessage(type, content, delay = 0) {
            setTimeout(() => {
                const msg = document.createElement('div');
                msg.className = `message ${type}`;
                msg.innerHTML = content;
                chatMessages.appendChild(msg);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, delay);
        }

        function highlightCircuit() {
            millerCap.classList.add('circuit-highlight');
        }

        function updateCapacitor() {
            capValue.textContent = '3.2pF';
            propCap.textContent = '3.2 pF';
            propCap.classList.add('updating');
            
            setTimeout(() => {
                propCap.classList.remove('updating');
            }, 2000);
        }

        function setStatus(type, content) {
            statusBar.className = `status-bar ${type}`;
            statusBar.innerHTML = content;
        }

        function runSequence() {
            // Clear previous messages
            chatMessages.innerHTML = '';
            millerCap.classList.remove('circuit-highlight');
            capValue.textContent = '1.5pF';
            propCap.textContent = '1.5 pF';
            tagline.classList.remove('show');

            // Phase 1: Run simulation (failed)
            setTimeout(() => {
                setStatus('failed', '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#ef4444" stroke-width="2"/><path d="M7 7l6 6M13 7l-6 6" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/></svg><span style="color: #ef4444; font-size: 14px; font-weight: 600;">Simulation failed: Phase margin 38° (spec: 60° min)</span>');
            }, 1000);

            // Phase 2: User asks for help
            setTimeout(() => {
                addMessage('user', 'Why is my phase margin failing? Can you help fix this?', 0);
            }, 2500);

            // Phase 3: Heraion thinking
            setTimeout(() => {
                addMessage('assistant', '<div class="thinking"><div class="spinner" style="width: 16px; height: 16px; border-width: 2px;"></div>Analyzing circuit topology and simulation results...</div>', 0);
            }, 3500);

            // Phase 4: Heraion analysis
            setTimeout(() => {
                chatMessages.lastChild.remove(); // Remove thinking message
                
                addMessage('assistant', `<strong>Analysis Complete</strong><br><br>
                    Your phase margin is <strong>38°</strong> (below 60° spec).<br><br>
                    <strong>Root cause:</strong> Miller compensation capacitor (C_comp) is insufficient for the gain-bandwidth product.<br><br>
                    Current value: <code>1.5 pF</code><br><br>
                    <strong>Recommendation:</strong><br>
                    Increase C_comp to <strong>3.2 pF</strong>
                    <div class="code-block">
                    Expected Results:<br>
                    • Phase Margin: 38° → 65°<br>
                    • GBW: -8% (acceptable)<br>
                    • Power: +12% (within budget)
                    </div>`, 0);
                
                highlightCircuit();
            }, 5000);

            // Phase 5: Apply button
            setTimeout(() => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-button';
                btn.innerHTML = 'Apply Changes to Circuit';
                btn.onclick = () => applyChanges(btn);
                chatMessages.lastChild.appendChild(btn);
            }, 5500);

            // Auto-apply for demo purposes
            setTimeout(() => {
                const btn = chatMessages.querySelector('.suggestion-button');
                if (btn) btn.click();
            }, 7500);
        }

        function applyChanges(button) {
            button.disabled = true;
            button.innerHTML = '<div class="spinner" style="width: 16px; height: 16px; border-width: 2px; border-color: white; border-top-color: transparent;"></div>Applying...';
            
            setTimeout(() => {
                updateCapacitor();
                button.className = 'suggestion-button success';
                button.innerHTML = '✓ Applied';
                
                addMessage('assistant', `<strong>Changes Applied</strong><br><br>
                    C_comp updated: 1.5 pF → 3.2 pF<br><br>
                    Running verification simulation...`, 200);
                
                setTimeout(() => {
                    setStatus('success', '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#10b981" stroke-width="2"/><path d="M6 10l3 3 5-6" stroke="#10b981" stroke-width="2" stroke-linecap="round"/></svg><span style="color: #10b981; font-size: 14px; font-weight: 600;">✓ Simulation passed: Phase margin 65°</span>');
                    
                    addMessage('assistant', `<strong>Verification Complete ✓</strong>
                        <div class="code-block" style="background: #064e3b; border-color: #10b981;">
                        Performance Summary:<br>
                        • Phase Margin: <strong>65°</strong> ✓<br>
                        • Gain-Bandwidth: 12.4 MHz<br>
                        • Power: 2.8 mW<br>
                        • Settling Time: 95 ns<br><br>
                        <strong>Time saved: 3h 35min</strong>
                        </div>`, 400);
                    
                    tagline.classList.add('show');
                    
                    // Loop the demo
                    setTimeout(() => {
                        runSequence();
                    }, 8000);
                }, 1500);
            }, 1500);
        }

        // Start the demo
        runSequence();
    </script>
</body>
</html>
